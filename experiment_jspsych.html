<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammatical Judgement Survey</title>

<!-- jsPsych v8 + plugins -->
<script src="https://unpkg.com/jspsych@8.0.2"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@2.0.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-html-button-response@2.0.0"></script>
<script src="https://unpkg.com/@jspsych/plugin-survey-text@2.0.0"></script>
<script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.5"></script>
<link rel="stylesheet" href="https://unpkg.com/jspsych@8.0.2/css/jspsych.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; width: 100%; min-height: 100vh; overflow-x: hidden; -webkit-text-size-adjust: 100%; }
body { 
  background: linear-gradient(160deg, #f0f4ff 0%, #e8ecf8 40%, #f5f0ff 100%); 
  background-attachment: fixed; 
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
  color: #1e1b4b; 
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Căn giữa dọc thông minh & bảo vệ nội dung không bao giờ bị che khuất */
.jspsych-display-element { 
  font-family: 'Inter', sans-serif !important; 
  width: 100% !important; 
  max-width: 100vw !important; 
  overflow-x: hidden !important; 
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  flex-grow: 1 !important;
  min-height: 100vh !important;
  margin: 0 !important;
  padding: 0 !important;
}
.jspsych-content-wrapper { 
  width: 100% !important; 
  max-width: 100vw !important; 
  /* Tăng padding bottom lên 180px để tạo khoảng đệm thông thoáng tối đa ở đáy màn hình, giúp cuộn nội dung lên cao hơn */
  padding: 105px 20px 180px !important; 
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  flex-grow: 1 !important;
  min-height: 100vh !important;
}

/* Bộ lò xo Flexbox thông minh: 
   Giúp đẩy nội dung lên phía trên một chút khi ở chế độ căn giữa dọc, 
   đồng thời tự co về 0px khi màn hình thấp hoặc khi xoay ngang điện thoại để tránh lỗi scroll.
*/
.jspsych-content-wrapper::before {
  content: "" !important;
  flex-grow: 1 !important;
  flex-shrink: 1 !important;
  min-height: 0 !important;
  height: 0 !important;
}
.jspsych-content-wrapper::after {
  content: "" !important;
  flex-grow: 1.6 !important; /* Lực đẩy phía dưới mạnh hơn (1.6 so với 1), định vị nội dung dịch lên trên một chút */
  flex-shrink: 1 !important;
  min-height: 0 !important;
  height: 0 !important;
}

.jspsych-content { 
  max-width: 920px !important; 
  width: 100% !important; 
  margin: 0 auto !important; /* Reset margin top/bottom để nhường quyền căn chỉnh cho phần tử ảo ::before và ::after */
  z-index: 10;
}

/* Progress bar */
.step-progress { display: flex; justify-content: center; align-items: center; max-width: 600px; margin: 0 auto 36px; padding: 0; }
.step-progress .step-col { display: flex; flex-direction: column; align-items: center; min-width: 60px; }
.step-progress .step-circle { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; transition: all 0.3s ease; }
.step-progress .step-circle.done { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; }
.step-progress .step-circle.active { background: white; color: #6366f1; border: 3px solid #6366f1; box-shadow: 0 0 0 4px rgba(99,102,241,0.15); }
.step-progress .step-circle.upcoming { background: #e2e8f0; color: #94a3b8; }
.step-progress .step-label { font-size: 11px; font-weight: 600; color: #6b7280; margin-top: 6px; white-space: nowrap; }
.step-progress .step-line { width: 40px; height: 3px; border-radius: 3px; flex-shrink: 0; margin: 0 4px 18px; }
.step-progress .step-line.done { background: linear-gradient(90deg, #6366f1, #8b5cf6); }
.step-progress .step-line.upcoming { background: #e2e8f0; }

/* UI Progress Card nổi bật và cao cấp ở top - Thiết kế thu nhỏ Dynamic Pill */
.global-progress-card {
  position: fixed;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 32px);
  max-width: 340px; /* Thu nhỏ bề ngang tinh tế dạng Capsule */
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 20px; /* Tạo góc bo tròn hiện đại mềm mại */
  box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.12), 0 8px 16px -6px rgba(99, 102, 241, 0.08);
  border: 1px solid rgba(99, 102, 241, 0.18);
  padding: 10px 18px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none; /* Tránh cản trở thao tác click nếu người dùng cuộn sát đỉnh */
}
.progress-info {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
}
.progress-label {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: #4f46e5;
}
.progress-percentage {
  font-size: 12px;
  font-weight: 800;
  color: #8b5cf6;
  background: rgba(139, 92, 246, 0.1);
  padding: 1px 6px;
  border-radius: 8px;
}
.progress-bar-track {
  width: 100%;
  height: 6px;
  background: #f1f5f9;
  border-radius: 6px;
  overflow: hidden;
  border: 1px solid rgba(226, 232, 240, 0.8);
}
.progress-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #6366f1, #8b5cf6);
  border-radius: 6px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 6px rgba(99, 102, 241, 0.3);
}

/* Card design */
.survey-card { background: white; border-radius: 20px; box-shadow: 0 4px 30px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.03); padding: 48px 52px; max-width: 850px; margin: 0 auto 32px; border: 1px solid rgba(99,102,241,0.08); text-align: left; }
.survey-card h2 { font-size: 26px; font-weight: 700; color: #1e1b4b; text-align: center; margin-bottom: 28px; letter-spacing: -0.5px; }
.survey-card p { font-size: 15px; line-height: 1.8; color: #374151; margin-bottom: 16px; }
.survey-card b, .survey-card strong { color: #1e1b4b; font-weight: 600; }
.survey-card ul { padding-left: 24px; }
.survey-card li { font-size: 15px; line-height: 1.8; color: #374151; margin-bottom: 6px; }

.section-header { text-align: center; padding: 52px 44px; background: white; border-radius: 20px; box-shadow: 0 4px 30px rgba(0,0,0,0.06); max-width: 750px; margin: 0 auto 32px; border: 1px solid rgba(99,102,241,0.08); }
.section-header h1 { font-size: 30px; font-weight: 800; background: linear-gradient(135deg, #4f46e5, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 16px; letter-spacing: -0.5px; line-height: 1.25; padding-bottom: 0.15em; }
.section-header p { font-size: 16px; color: #374151; line-height: 1.8; margin-bottom: 8px; }
.section-header .note { display: inline-block; background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; padding: 10px 24px; border-radius: 10px; font-weight: 600; font-size: 15px; margin-top: 16px; }
.section-header .scale-legend { background: #f8fafc; border: 1px solid rgba(99,102,241,0.12); border-radius: 14px; padding: 20px 28px; margin: 20px auto 16px; max-width: 480px; text-align: left; }
.section-header .scale-legend p { font-size: 14px; color: #374151; margin-bottom: 6px; line-height: 1.6; }

.question-card { background: white; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.05) !important; padding: 40px 44px; max-width: 800px; margin: 0 auto 24px; border: 1px solid rgba(99,102,241,0.08); text-align: center; }
.question-card .q-label { font-size: 19px; color: #1e1b4b; font-weight: 600; display: block; margin-bottom: 0px; } /* Reset margin bottom */
.question-card .q-hint { color: #6b7280; font-size: 14px; display: block; margin-top: 6px; line-height: 1.5; } /* Tối ưu hóa khoảng cách khít hơn, dễ đọc */

.ielts-card { text-align: center; background: white; border-radius: 16px; box-shadow: 0 2px 16px rgba(0,0,0,0.05); padding: 40px 44px; max-width: 600px; margin: 0 auto 24px; border: 1px solid rgba(99,102,241,0.08); }
.ielts-card h3 { font-size: 22px; font-weight: 700; color: #1e1b4b; margin-bottom: 24px; }

.practice-done-card, .ending-card { text-align: center; background: white; border-radius: 20px; box-shadow: 0 4px 30px rgba(0,0,0,0.06); padding: 52px; max-width: 750px; margin: 0 auto 32px; border: 1px solid rgba(99,102,241,0.08); }
.practice-done-card .emoji-big, .ending-card .emoji-big { font-size: 56px; display: block; margin-bottom: 20px; }
.practice-done-card h2, .ending-card h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #4f46e5, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 24px; line-height: 1.25; padding-bottom: 0.15em; }
.practice-done-card p, .ending-card p { font-size: 16px; color: #4b5563; line-height: 1.8; margin-bottom: 14px; }

.sentence-display { font-size: 24px; font-family: 'Georgia', serif; color: #1e1b4b; text-align: center; padding: 36px 44px; background: linear-gradient(135deg, #f8fafc, #eef2ff); border-radius: 16px; margin: 16px auto 32px; max-width: 800px; border: 1px solid rgba(99,102,241,0.1); line-height: 1.6; }
.timer-badge { display: inline-block; background: linear-gradient(135deg, #fee2e2, #fecaca); color: #dc2626; padding: 10px 28px; border-radius: 50px; font-weight: 700; font-size: 15px; letter-spacing: 0.3px; border: 1px solid rgba(220,38,38,0.15); margin-bottom: 12px; }
.practice-badge { display: inline-block; background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: #065f46; padding: 10px 28px; border-radius: 50px; font-weight: 700; font-size: 15px; letter-spacing: 0.3px; border: 1px solid rgba(6,95,70,0.15); margin-bottom: 12px; }
.error-msg { display: inline-block; background: #fef2f2; color: #dc2626; padding: 10px 24px; border-radius: 10px; font-weight: 500; font-size: 14px; border: 1px solid rgba(220,38,38,0.15); margin: 12px auto; }

/* Rating Scale - Cấu trúc căn lề chân đế cực kỳ Responsive 
   Giữ nguyên một dải ngang từ 1 đến 7 trên cả Mobile và Desktop.
   Hai nhãn đầu cuối hiển thị thẳng hàng cân xứng bên dưới, không bị lệch hoặc biến dạng.
*/
.rating-scale { display: flex; justify-content: center; align-items: center; width: 100%; max-width: 650px; margin: 0 auto 28px; }
.scale-container { display: flex; flex-direction: column; width: 100%; padding: 0 10px; }
.scale-options-row { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 8px; }

.rating-scale .scale-option { 
  flex: 1; 
  display: flex; 
  flex-direction: column; 
  align-items: center; 
  cursor: pointer; 
  padding: 8px 4px; 
  border-radius: 12px; 
  transition: background 0.15s, border-color 0.15s; 
  border: 1px solid rgba(99, 102, 241, 0.08); 
  background: #f8fafc; 
}
.rating-scale .scale-option:hover { background: rgba(99,102,241,0.06); border-color: rgba(99,102,241,0.2); }
.rating-scale .scale-option .num { font-size: 18px; font-weight: 700; color: #1e1b4b; margin-bottom: 8px; }
.rating-scale .scale-option input[type="radio"] { width: 22px; height: 22px; accent-color: #6366f1; cursor: pointer; margin: 0; }
.rating-scale .scale-option.selected { background: rgba(99,102,241,0.1); border-color: #6366f1; }

.scale-labels-row { display: flex; justify-content: space-between; width: 100%; margin-top: 10px; padding: 0 4px; }
.scale-labels-row .scale-anchor { font-size: 13px; color: #4f46e5; font-weight: 700; letter-spacing: 0.3px; line-height: 1.4; text-transform: uppercase; }
.scale-labels-row .scale-anchor.left { text-align: left; width: 48%; }
.scale-labels-row .scale-anchor.right { text-align: right; width: 48%; }

/* Common UI */
.consent-choice { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; margin: 15px auto; max-width: 350px; font-size: 15px; }
.consent-choice label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.consent-choice input[type="radio"] { width: 20px; height: 20px; accent-color: #6366f1; }

.ielts-options { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin: 16px auto 24px; }
.ielts-options label { display: flex; align-items: center; gap: 8px; padding: 10px 18px; background: #f8fafc; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 15px; border: 1px solid rgba(99,102,241,0.12); transition: background 0.15s, border-color 0.15s; }
.ielts-options label:hover { background: #eef2ff; border-color: #6366f1; }
.ielts-options input[type="radio"] { width: 18px; height: 18px; accent-color: #6366f1; }

.jspsych-btn, button.app-btn { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%) !important; color: white !important; border: none !important; border-radius: 12px !important; padding: 14px 44px !important; font-size: 16px !important; font-weight: 600 !important; font-family: 'Inter', sans-serif !important; cursor: pointer !important; transition: all 0.3s cubic-bezier(0.4,0,0.2,1) !important; box-shadow: 0 4px 15px rgba(99,102,241,0.25) !important; letter-spacing: 0.3px !important; margin: 8px 6px !important; }
.jspsych-btn:hover, button.app-btn:hover { transform: translateY(-2px) !important; box-shadow: 0 8px 25px rgba(99,102,241,0.35) !important; }
.jspsych-btn:disabled, button.app-btn:disabled { opacity: 0.5 !important; cursor: not-allowed !important; transform: none !important; }

input[type="text"], textarea, .jspsych-survey-text-question input { border: 2px solid #e2e8f0 !important; border-radius: 12px !important; padding: 14px 20px !important; font-size: 16px !important; font-family: 'Inter', sans-serif !important; outline: none !important; background: #fafafa !important; color: #1e1b4b !important; width: 100% !important; max-width: 600px !important; }
input[type="text"]:focus, textarea:focus, .jspsych-survey-text-question input:focus { border-color: #6366f1 !important; box-shadow: 0 0 0 4px rgba(99,102,241,0.1) !important; background: white !important; }

/* Responsive adjustments */
@media (max-width: 768px) {
  body { font-size: 14px; padding-top: 0px !important; } /* Loại bỏ padding-top tuyệt đối trên body */
  .jspsych-display-element {
    min-height: 100vh !important;
  }
  /* Tăng padding-bottom (150px) tạo khoảng trống thông thoáng tối đa ở dưới cùng trên máy tính bảng */
  .jspsych-content-wrapper { padding: 95px 12px 150px !important; min-height: 100vh !important; }
  .jspsych-content { 
    max-width: 100% !important; 
    margin-top: 0 !important;
    margin-bottom: 0 !important;
    margin-left: auto !important;
    margin-right: auto !important;
  }
  .step-progress { max-width: 100%; gap: 4px; }
  .step-progress .step-col { min-width: 0; flex: 0 0 auto; }
  .step-progress .step-circle { width: 30px; height: 30px; font-size: 12px; }
  .step-progress .step-label { font-size: 10px; margin-top: 4px; }
  .step-progress .step-line { width: clamp(12px, 5vw, 24px); margin-bottom: 16px; }
  .survey-card, .section-header, .question-card, .practice-done-card, .ending-card, .ielts-card { padding: 22px 16px; margin: 0 auto 20px; max-width: 100%; border-radius: 14px; }
  .survey-card h2 { font-size: 19px; margin-bottom: 16px; }
  .survey-card p, .survey-card li { font-size: 14px; line-height: 1.6; }
  .section-header h1, .ending-card h1, .practice-done-card h2 { font-size: 21px; line-height: 1.3; padding-bottom: 0.15em; }
  .section-header p, .ending-card p, .practice-done-card p { font-size: 14px; line-height: 1.6; }
  .section-header .scale-legend { padding: 14px; max-width: 100%; }
  .section-header .scale-legend p { font-size: 13px; }
  .ielts-card h3 { font-size: 18px; }
  .question-card .q-label { font-size: 16px; }
  .question-card .q-hint { font-size: 12px; }
  .sentence-display { font-size: 17px; padding: 20px 14px; margin: 12px auto 20px; max-width: 100%; }
  
  /* Giữ nguyên hàng ngang và co giãn các nút lựa chọn để phù hợp với chiều ngang điện thoại */
  .rating-scale .scale-option .num { font-size: 16px; margin-bottom: 6px; }
  .rating-scale .scale-option input[type="radio"] { width: 18px; height: 18px; }
  .scale-labels-row .scale-anchor { font-size: 11px !important; }
  
  .timer-badge, .practice-badge { font-size: 13px; padding: 8px 16px; }
  .jspsych-btn, button.app-btn { padding: 12px 26px !important; font-size: 15px !important; min-height: 44px !important; }
}

@media (max-width: 480px) {
  body { padding-top: 0px !important; }
  .jspsych-display-element {
    min-height: 100vh !important;
  }
  /* Tăng padding-bottom (130px) tạo khoảng đệm an toàn tối đa cho điện thoại giúp cuộn trang lên rất cao */
  .jspsych-content-wrapper { padding: 85px 12px 130px !important; min-height: 100vh !important; }
  .jspsych-content {
    margin-top: 0 !important;
    margin-bottom: 0 !important;
    margin-left: auto !important;
    margin-right: auto !important;
  }
  .step-progress .step-label { display: none; }
  .step-progress .step-circle { width: 26px; height: 26px; font-size: 11px; }
  .step-progress .step-line { width: 14px; margin-bottom: 0; }
  .survey-card, .section-header, .question-card, .practice-done-card, .ending-card, .ielts-card { padding: 18px 12px; }
  .survey-card h2 { font-size: 18px; }
  .section-header h1, .ending-card h1, .practice-done-card h2 { font-size: 19px; }
  .practice-done-card .emoji-big, .ending-card .emoji-big { font-size: 42px; }
  .sentence-display { font-size: 16px; padding: 16px 12px; }
  
  /* Tối ưu hóa kích thước nút bấm chạm trên màn hình di động nhỏ nhất */
  .rating-scale .scale-option { padding: 6px 2px; }
  .rating-scale .scale-option .num { font-size: 14px; margin-bottom: 4px; }
  .rating-scale .scale-option input[type="radio"] { width: 16px; height: 16px; }
  .scale-labels-row .scale-anchor { font-size: 10px !important; }
  
  .global-progress-card { top: 8px; padding: 8px 14px; width: calc(100% - 16px); gap: 4px; border-radius: 12px; }
  .progress-label { font-size: 10px; }
  .progress-percentage { font-size: 11px; padding: 1px 6px; }
  .progress-bar-track { height: 6px; }
  
  .jspsych-btn, button.app-btn { padding: 11px 20px !important; font-size: 14px !important; }
}
</style>
</head>
<body>
  <!-- Khung Tiến trình UI Progress Card cao cấp dạng Floating Card ở Top -->
  <div id="global-progress-card" class="global-progress-card">
    <div class="progress-info">
      <span class="progress-label">Survey Progress</span>
      <span id="global-progress-text" class="progress-percentage">0%</span>
    </div>
    <div class="progress-bar-track">
      <div id="global-progress-bar" class="progress-bar-fill"></div>
    </div>
  </div>
</body>

<script>
/* ╔══════════════════════════════════════════════════════════════════════════╗
   ║                                                                          ║
   ║   📝 PHẦN NỘI DUNG — CHỈNH SỬA TẠI ĐÂY                                    ║
   ║                                                                          ║
   ║   Tất cả nội dung text, câu hỏi, sentences đều ở phần này.               ║
   ║   Bạn KHÔNG cần chỉnh phần code logic ở dưới.                            ║
   ║                                                                          ║
   ║   Lưu ý:                                                                 ║
   ║   - Dấu " " quanh text rất quan trọng, đừng xóa                          ║
   ║   - Mỗi item kết thúc bằng dấu phẩy (,) trừ item cuối                    ║
   ║   - Nếu text có dấu " bên trong, viết \" để escape                       ║
   ║   - HTML tags <b>, <p>, <br>, <ul>, <li> dùng được trong text            ║
   ║                                                                          ║
   ╚══════════════════════════════════════════════════════════════════════════╝ */


// ──────────────────────────────────────────────────────────────────────────
// 💾 LƯU DỮ LIỆU (DataPipe)
// ──────────────────────────────────────────────────────────────────────────
//
// Sau khi setup DataPipe (xem HUONG_DAN.md), paste experiment ID vào đây.
// Ví dụ: const DATAPIPE_EXPERIMENT_ID = "abc123xyz";
//
// Nếu để trống "", data sẽ được tải về máy participant (chỉ dùng để test local).
const DATAPIPE_EXPERIMENT_ID = "5IdHzlBG1reI";


// ──────────────────────────────────────────────────────────────────────────

    current_trial_index++;

// ── Randomization: chia participant vào 1 trong 8 sets (Latin square) ──
const group = Math.floor(Math.random() * 8);
const setNumber = group + 1;

// ── Hàm trộn câu, max 2 target liên tiếp ──
function shuffleConstrained(targetTrials, fillerTrials) {
  const t = [...targetTrials].sort(() => Math.random() - 0.5);
  const f = [...fillerTrials].sort(() => Math.random() - 0.5);
  const result = [];
  let ti = 0, fi = 0, consec = 0;
  while (ti < t.length || fi < f.length) {
    const canTarget = ti < t.length && consec < 2;
    const canFiller = fi < f.length;
    if (canTarget && canFiller) {
      if (Math.random() < 0.33 || consec >= 2) {
        result.push(f[fi++]); consec = 0;
      } else {
        result.push(t[ti++]); consec++;
      }
    } else if (canTarget) {
      result.push(t[ti++]); consec++;
    } else {
      result.push(f[fi++]); consec = 0;
    }
  }
  return result;
}

// ── Step progress UI ──
function stepProgress(activeStep) {
  const steps = ["Consent", "Background", "Judgement", "Finish"];
  let html = "<div class='step-progress'>";
  for (let i = 0; i < steps.length; i++) {
    const circleClass = i < activeStep ? "done" : (i === activeStep ? "active" : "upcoming");
    const icon = i < activeStep ? "✓" : (i + 1);
    html += "<div class='step-col'>";
    html += "<div class='step-circle " + circleClass + "'>" + icon + "</div>";
    html += "<div class='step-label'>" + steps[i] + "</div>";
    html += "</div>";
    if (i < steps.length - 1) {
      const lineClass = i < activeStep ? "done" : "upcoming";
      html += "<div class='step-line " + lineClass + "'></div>";
    }
  }
  html += "</div>";
  return html;
}

// ── Factory: tạo 1 trial phán đoán câu (10s timer, RT logging, hiển thị Anchor theo hàng ngang cố định bên dưới) ──
function makeJudgementTrial(label, sentence, meta, isPractice) {
  const safeId = label.replace(/[^a-zA-Z0-9_-]/g, "_") + "_" + Math.floor(Math.random() * 100000);
  const badge = isPractice
    ? `<span class='practice-badge'>📝 Practice &nbsp;|&nbsp; <span id='cd_${safeId}'>Time remaining: ${TIMER_SECONDS}s</span></span>`
    : `<span class='timer-badge'><span id='cd_${safeId}'>Time remaining: ${TIMER_SECONDS}s</span></span>`;

  // Thiết kế cấu trúc scale-container hoàn toàn nằm dưới dòng số 1-7, căn sát mép trái-phải
  const scaleHtml = `
    <div class="rating-scale">
      <div class="scale-container">
        <div class="scale-options-row">
          ${[1,2,3,4,5,6,7].map(n => `
            <label class="scale-option" data-val="${n}">
              <span class="num">${n}</span>
              <input type="radio" name="rating_${safeId}" value="${n}">
            </label>
          `).join("")}
        </div>
        <div class="scale-labels-row">
          <span class="scale-anchor left">Completely unacceptable</span>
          <span class="scale-anchor right">Completely acceptable</span>
        </div>
      </div>
    </div>
  `;

  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      ${stepProgress(2)}
      <div style="text-align:center;">${badge}</div>
      <div class="sentence-display">${sentence}</div>
      ${scaleHtml}
      <div id="err_${safeId}" class="error-msg" style="display:none;">Please select a rating!</div>
      <div style="text-align:center;">
        <button id="next_${safeId}" class="app-btn">Next</button>
      </div>
    `,
    choices: "NO_KEYS",
    trial_duration: TIMER_SECONDS * 1000,
    data: {
      task: isPractice ? "practice" : "judgement",
      item_id: meta.item_id,
      item_label: label,
      trial_type: meta.trial_type,
      condition: meta.condition,
      set_number: meta.set_number,
      grammaticality: meta.grammaticality,
      sentence: sentence
    },
    on_load: function () {
      const startPerf = performance.now();
      const startEpoch = Date.now();
      const startISO = new Date(startEpoch).toISOString();
      let firstRating = null;
      let firstRT = null;
      let finalRating = null;

      document.querySelectorAll(`input[name="rating_${safeId}"]`).forEach(r => {
        r.addEventListener("change", function () {
          finalRating = this.value;
          if (firstRating === null) {
            firstRating = this.value;
            firstRT = performance.now() - startPerf;
          }
          // Scoped chỉ xóa selected trong chính block rating hiện tại
          const scaleContainer = this.closest(".scale-container");
          if (scaleContainer) {
            scaleContainer.querySelectorAll(`label.scale-option`).forEach(l => l.classList.remove("selected"));
          }
          this.closest("label.scale-option")?.classList.add("selected");
        });
      });

      let timeLeft = TIMER_SECONDS;
      const cd = document.getElementById(`cd_${safeId}`);
      const interval = setInterval(() => {
        timeLeft--;
        if (cd) cd.innerText = `Time remaining: ${timeLeft}s`;
        if (timeLeft <= 0) clearInterval(interval);
      }, 1000);

      window.__currentTrial = {
        startPerf, startEpoch, startISO, interval,
        get firstRating() { return firstRating; },
        get firstRT() { return firstRT; },
        get finalRating() { return finalRating; },
        manualSubmit: false
      };

      document.getElementById(`next_${safeId}`).addEventListener("click", function () {
        if (!finalRating) {
          document.getElementById(`err_${safeId}`).style.display = "inline-block";
          return;
        }
        clearInterval(interval);
        window.__currentTrial.manualSubmit = true;
        window.__currentTrial._submitRT = performance.now() - startPerf;
        window.__currentTrial._finalRating = finalRating;
        window.__currentTrial._firstRating = firstRating;
        window.__currentTrial._firstRT = firstRT;
        jsPsych.finishTrial();
      });
    },
    on_finish: function (data) {
      const t = window.__currentTrial || {};
      if (t.interval) clearInterval(t.interval);
      const fr = t._firstRating ?? t.firstRating;
      const ff = t._finalRating ?? t.finalRating;
      const frt = t._firstRT ?? t.firstRT;
      const submitted = !!t.manualSubmit;
      data.trial_start_epoch_ms = t.startEpoch ?? "NA";
      data.trial_start_iso = t.startISO ?? "NA";
      data.rating_first_value = fr ?? "NA";
      data.rating_final_value = ff ?? "NA";
      data.rating_rt_ms = frt != null ? Math.round(frt) : "NA";
      data.rating_rt_sec = frt != null ? (frt / 1000).toFixed(3) : "NA";
      data.time_limit_sec = TIMER_SECONDS.toFixed(3);
      data.time_left_after_rating_sec = frt != null ? Math.max(0, TIMER_SECONDS - frt / 1000).toFixed(3) : "0.000";
      data.submit_rt_ms = submitted ? Math.round(t._submitRT) : "NA";
      data.submit_rt_sec = submitted ? (t._submitRT / 1000).toFixed(3) : "NA";
      if (submitted) data.response_status = "submitted";
      else if (fr != null) data.response_status = "timed_out_after_rating";
      else data.response_status = "timed_out_no_rating";
      data.participant_set = setNumber;
      data.participant_group = group;
    }
  };
}

    <div class="consent-choice">
      <label><input type="radio" name="consent" value="agree"> I agree</label>
      <label><input type="radio" name="consent" value="decline"> I do not agree</label>
    </div>
    <div style="text-align:center;">
      <button id="consent_btn" class="app-btn" disabled>Start Survey</button>
    </div>
  `,
  choices: "NO_KEYS",
  data: { task: "consent" },
  on_load: function () {
    const btn = document.getElementById("consent_btn");
    document.querySelectorAll('input[name="consent"]').forEach(r => {
      r.addEventListener("change", function () {
        btn.disabled = false;
        btn.dataset.choice = this.value;
      });
    });
    btn.addEventListener("click", function () {
      window.__consentChoice = btn.dataset.choice;
      jsPsych.finishTrial();
    });
  },
  on_finish: function (data) {
    data.consent_choice = window.__consentChoice || "no_response";
    if (data.consent_choice !== "agree") {
      jsPsych.abortExperiment(`
        <div class="survey-card" style="text-align:center;">
          <p style="font-size:18px;">Thank you. The survey has been closed.</p>
        </div>
      `);
    }
  }
};

// ── Trial: Background intro ──
const background_intro = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    ${stepProgress(1)}
    <div class="section-header">
      <h1>Part 1: Personal Language Learning Background</h1>
    </div>
  `,
  choices: ["Next"],
  data: { task: "background_intro" }
};

// ── Trial: IELTS check ──
const ielts_check = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    ${stepProgress(1)}
    <div class="ielts-card">
      <h3>What's your IELTS score?</h3>
      <div class="ielts-options">
        ${IELTS_SCORE_OPTIONS.map(s =>
          `<label><input type="radio" name="ielts" value="${s}"> ${s}</label>`
        ).join("")}
      </div>
      <div style="text-align:center;">
        <button id="ielts_btn" class="app-btn" disabled>Continue</button>
      </div>
    </div>
  `,
  choices: "NO_KEYS",
  data: { task: "ielts_check" },
  on_load: function () {
    const btn = document.getElementById("ielts_btn");
    document.querySelectorAll('input[name="ielts"]').forEach(r => {
      r.addEventListener("change", function () {
        btn.disabled = false;
        window.__ieltsChoice = this.value;
      });
    });
    btn.addEventListener("click", () => jsPsych.finishTrial());
  },
  on_finish: function (data) {
    data.ielts_score = window.__ieltsChoice || "no_response";
    if (IELTS_REJECT_SCORES.includes(data.ielts_score)) {
      jsPsych.abortExperiment(IELTS_REJECT_HTML);
    }
  }
};

// ── Trials: Background questions (Đã loại bỏ hoàn toàn thẻ br để dẹp bỏ khoảng trống dư thừa lớn) ──
const bg_questions = BACKGROUND_QUESTIONS.map(q => ({
  type: jsPsychSurveyText,
  preamble: `
    ${stepProgress(1)}
    <div class="question-card">
      <span class="q-label">${q.question}</span>
      <span class="q-hint">${q.hint || ""}</span>
    </div>
  `,
  questions: [{ prompt: "", name: q.id, required: true, placeholder: "Type your answer..." }],
  button_label: "Next",
  data: { task: "background_question", item_id: q.id }
}));

// ── Trial: Judgment intro ──
const judgment_intro = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    ${stepProgress(2)}
    ${JUDGMENT_INTRO_HTML}
  `,
  choices: ["Start Examples"],
  data: { task: "judgment_intro" }
};

// ── Trials: Practice ──
const practice_trials = PRACTICE_SENTENCES.map((s, i) => makeJudgementTrial(
  "practice_trials",
  s,
  {
    item_id: "practice_" + String(i + 1).padStart(2, "0"),
    trial_type: "practice",
    condition: "NA",
    set_number: "NA",
    grammaticality: "NA"
  },
  true
));

// ── Trial: Practice done ──
const practice_done = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    ${stepProgress(2)}
    ${PRACTICE_DONE_HTML}
  `,
  choices: ["Begin Test"],
  data: { task: "practice_done" }
};

// ── Trials: Target + Filler (shuffled with constraint) ──
const target_trials = TARGET_SETS[group].map((sentence, i) => {
  const cond = CONDITIONS[i];
  const trialLabel = "target_" + cond.name + "_set" + setNumber + "_" + cond.grammaticality;
  return makeJudgementTrial(trialLabel, sentence, {
    item_id: trialLabel,
    trial_type: "target",
    condition: cond.name,
    set_number: "set" + setNumber,
    grammaticality: cond.grammaticality
  }, false);
});

const filler_trials = FILLERS.map(f => makeJudgementTrial(
  f.id, f.sentence,
  { item_id: f.id, trial_type: "filler", condition: "NA", set_number: "NA", grammaticality: "NA" },
  false
));

const main_trials = shuffleConstrained(target_trials, filler_trials);

// ── Trial: Ending ──
const thanks_trial = {
  type: jsPsychSurveyText,
  preamble: `
    ${stepProgress(3)}
    ${ENDING_HTML}
  `,
  questions: [{
    prompt: "Your email address (optional)",
    name: "email",
    required: false,
    placeholder: "your.email@example.com"
  }],
  button_label: "Finish & Submit",
  data: { task: "thanks" }
};

// ── Save data trial (chỉ chạy khi DATAPIPE_EXPERIMENT_ID đã cấu hình) ──
const save_trial = {
  type: jsPsychPipe,
  action: "save",
  experiment_id: DATAPIPE_EXPERIMENT_ID,
  filename: () => `${jsPsych.randomization.randomID(10)}.csv`,
  data_string: () => jsPsych.data.get().csv()
};

// ── Final confirmation sau khi save xong ──
const final_confirm = {
  type: jsPsychHtmlButtonResponse,
  stimulus: `
    <div class="ending-card">
      <span class="emoji-big">✅</span>
      <h1>Your responses have been recorded!</h1>
      <p>You may now close this tab. Thank you again for your participation.</p>
    </div>
  `,
  choices: ["Close"],
  data: { task: "final_confirm" }
};

// ── Build timeline + run ──
const timeline = [
  consent_trial,
  background_intro,
  ielts_check,
  ...bg_questions,
  judgment_intro,
  ...practice_trials,
  practice_done,
  ...main_trials,
  thanks_trial,
  // save_trial chỉ chạy nếu DataPipe đã setup
  ...(DATAPIPE_EXPERIMENT_ID ? [save_trial] : []),
  final_confirm
];

// Khóa tổng số trial thực tế của toàn bộ timeline để tính tỷ lệ % chính xác
total_trials = timeline.length;

jsPsych.run(timeline);
</script>
